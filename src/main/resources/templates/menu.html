<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders</title>

    <link rel="stylesheet" href="assets/css/menu.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <!-- HEADER -->

    <header>

        <div class="logo">

            <i class="fa-brands fa-apple"></i>

            <h2>Ipad Việt</h2>

        </div>


        <nav>

            <a href="home.html">Home</a>

            <a href="order.html">Order</a>

            <a href="user.html">User</a>

        </nav>

    </header>



    <!-- CONTENT -->

    <div class="container">

        <h1>My Orders</h1>



        <!-- ORDER 1 -->

        <div class="order-card">

            <img src="https://store.storeimages.cdn-apple.com/1/as-images.apple.com/is/iphone16pro"
                alt="">


            <div class="info">

                <h2>iPhone 16 Pro</h2>

                <p>Quantity : 1</p>

                <p>Order Date : 18/06/2026</p>

                <p>Total : $999</p>

            </div>


            <div class="status delivered">

                Delivered

            </div>


            <button>

                View Detail

            </button>

        </div>




        <!-- ORDER 2 -->


        <div class="order-card">

            <img src="https://store.storeimages.cdn-apple.com/1/as-images.apple.com/is/macbook-air"
                alt="">


            <div class="info">

                <h2>Macbook Air M3</h2>

                <p>Quantity : 1</p>

                <p>Order Date : 15/06/2026</p>

                <p>Total : $1199</p>

            </div>


            <div class="status shipping">

                Shipping

            </div>


            <button>

                View Detail

            </button>

        </div>





        <!-- ORDER 3 -->


        <div class="order-card">

            <img src="https://store.storeimages.cdn-apple.com/1/as-images.apple.com/is/ipad-air"
                alt="">


            <div class="info">

                <h2>iPad Air 6</h2>

                <p>Quantity : 1</p>

                <p>Order Date : 12/06/2026</p>

                <p>Total : $699</p>

            </div>


            <div class="status pending">

                Pending

            </div>


            <button>

                View Detail

            </button>

        </div>



    </div>
